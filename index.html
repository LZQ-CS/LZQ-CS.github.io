<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lizhangqi的个人博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>
    
    <header>
        <nav>
            <div class="logo">My Blog</div>
            <ul class="nav-links">
                <li><a href="#home" class="nav-link">首页</a></li>
                <li><a href="#about" class="nav-link">关于</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="hero-content">
                <h1 class="animated-text">欢迎来到LiZhangqi的博客</h1>
                <p class="animated-subtext">探索我的创作与故事</p>
                <div class="social-links">
                    <a href="https://github.com/LZQ-CS" class="social-link"><i class="fab fa-github"></i></a>
                    <a href="#" class="social-link"><i class="fab fa-twitter"></i></a>
                    <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
                    <a href="https://space.bilibili.com/82681846" class="social-link"><i class="fab fa-bilibili"></i></a>
                </div>
            </div>
        </section>

        <section id="about" class="section">
            <h2>关于LiZhangqi</h2>
            <div class="about-content">
                <div class="profile-card">
                    <img src="my.JPG" class="profile-image" alt="个人头像">
                <div class="profile-info">
                    <h3>个性标签</h3>
                    <div class="tags-container">
                        <div class="tag">IT</div>
                        <div class="tag">ACG</div>
                        <div class="tag">CODER</div>
                    </div>
                    <!-- <div class="tag-input-container">
                        <input type="text" class="tag-input" placeholder="添加新标签...">
                        <button class="add-tag-btn">+</button>
                    </div> -->
                </div>
                </div>
                <div class="about-text">
                    <p>这里是我的Github博客主页，用来分享我的代码...</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 LiZhangqi个人博客</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
